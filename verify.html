<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Code</title>
    <link rel="stylesheet" href="verify.css">
</head>

<body>
    <div class="verify-container">
        <h2 class="brand-name">RenukaKetlary</h2>

        <h3>Enter 6 digit code send on your email.</h3>
        <p id="emailDisplay"></p>

<input type="text" id="otp" placeholder="Enter 6 digit code">
<button onclick="verifyOTP()">Verify</button>

<script>
function verifyOTP() {
  const otp = document.getElementById("otp").value;
  const email = localStorage.getItem("email");

  fetch("https://my-backend1-2-zz2k.onrender.com/verify-otp", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ email, otp })
  })
  .then(res => res.json())
  .then(data => {
    if (data.success) {
      // ✅ Mark user as logged in
      localStorage.setItem("isLoggedIn", "true");

      // ✅ Redirect to HOME (index.html)
      window.location.href = "index.html";
    } else {
      alert("Invalid OTP ❌");
    }
  })
  .catch(() => {
    alert("Server error");
  });
}
</script>


    </div>

    <script src="verify.js"></script>
</body>
</html>
