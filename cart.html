<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | RenukaKetlary</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f9f3ec 0%, #fff3e8 100%);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navigator {
            background: #fff;
            border-bottom: 1px solid #eaeaea;
            position: sticky;
            top: 0;
            z-index: 1000;
            padding: 0.5rem 2rem;
        }

        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: auto;
        }

        .logo {
            height: 50px;
        }

        .back-home-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f5f5f5;
            border-radius: 8px;
            text-decoration: none;
            color: #1a1a1a;
        }

        .back-home-btn:hover {
            background: #f0e6df;
            color: #b1624b;
        }

        /* MAIN */
        .cart-container {
            max-width: 1400px;
            margin: auto;
            padding: 2rem;
        }

        .cart-header {
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 2rem;
        }

        /* CART ITEMS */
        .cart-grid {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 120px 1fr auto;
            gap: 1rem;
            padding: 1.5rem;
            border-bottom: 1px solid #eee;
        }

        .cart-item-image {
            width: 100px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
        }

        .cart-item-details {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .cart-item-title {
            font-weight: 600;
        }

        .quantity-controls {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quantity-btn {
            width: 30px;
            height: 30px;
            border-radius: 8px;
            border: 1px solid #ddd;
            cursor: pointer;
        }

        .quantity-btn:hover {
            background: #b1624b;
            color: white;
        }

        .remove-item {
            border: none;
            background: none;
            cursor: pointer;
            font-size: 1.2rem;
        }

        /* SUMMARY */
        .cart-summary {
            background: white;
            border-radius: 20px;
            padding: 1.5rem;
            height: fit-content;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
        }

        .summary-row.total {
            font-weight: bold;
            font-size: 1.2rem;
        }

        .checkout-btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 12px;
            background: black;
            color: white;
            cursor: pointer;
        }

        .checkout-btn:hover {
            background: #b1624b;
        }

        /* MOBILE */
        @media (max-width: 968px) {
            .cart-layout {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <header class="navigator">
        <div class="nav-bar">
            <img class="logo" src="https://placehold.co/160x50/f8f0e5/8b5a2b?text=RenukaKetlary">
            <a href="products.html" class="back-home-btn">
                <i class="fas fa-arrow-left"></i> Continue Shopping
            </a>
        </div>
    </header>

    <!-- MAIN -->
    <div class="cart-container">

        <div class="cart-header">
            <h1><i class="fas fa-shopping-cart"></i> My Cart</h1>
            <div id="customer-display">Guest</div>
        </div>

        <div class="cart-layout">

            <!-- CART ITEMS -->
            <div id="cart-items" class="cart-grid"></div>

            <!-- SUMMARY -->
            <div class="cart-summary">
                <h3>Order Summary</h3>

                <div class="summary-row total">
                    <span>Total</span>
                    <span id="total">₹0</span>
                </div>

                <button id="checkoutBtn" class="checkout-btn">
                    Proceed to Checkout
                </button>

                <a href="products.html" style="display:block; text-align:center; margin-top:1rem;">
                    Continue Shopping
                </a>
            </div>

        </div>
    </div>
  <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtWPGZedQ2gwGYGDyJNc4-rM3LbWUsMtY",
            authDomain: "renukacutlary.firebaseapp.com",
            projectId: "renukacutlary",
            storageBucket: "renukacutlary.firebasestorage.app",
            messagingSenderId: "822608333582",
            appId: "1:822608333582:web:044c9635805ba5125fa55f"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // Removed SHIPPING_COST – cart total now equals subtotal only
        let currentUserId = null;
        let cart = [];

        function getCartKey() { return currentUserId ? `cart_${currentUserId}` : null; }
        function saveCart() { if (currentUserId) localStorage.setItem(getCartKey(), JSON.stringify(cart)); }

        function parsePrice(price) {
            if (typeof price === 'number') return price;
            if (!price) return 0;
            const cleaned = String(price).replace(/[₹,]/g, '').trim();
            const num = parseFloat(cleaned);
            return isNaN(num) ? 0 : num;
        }

        function formatPrice(price) { return '₹' + parsePrice(price).toLocaleString('en-IN'); }

        window.updateQuantity = function(index, change) {
            if (!cart[index]) return;
            const newQty = cart[index].quantity + change;
            if (newQty > 0) cart[index].quantity = newQty;
            else cart.splice(index, 1);
            saveCart();
            displayCart();
        };
        window.removeItem = function(index) { cart.splice(index, 1); saveCart(); displayCart(); };

        function displayCart() {
            const container = document.getElementById('cart-items');
            if (!cart.length) {
                container.innerHTML = `<div class="empty-cart"><i class="fas fa-shopping-bag"></i><p>Your cart is empty</p><a href="products.html" class="shop-now-btn">Start Shopping</a></div>`;
                document.getElementById('total').innerHTML = '₹0';
                // Clear any leftover order data
                localStorage.removeItem('orderSubtotal');
                localStorage.removeItem('orderShipping');
                localStorage.removeItem('orderTotal');
                localStorage.removeItem('orderItems');
                return;
            }
            let subtotal = 0;
            let html = '';
            cart.forEach((item, idx) => {
                const price = parsePrice(item.price);
                const qty = item.quantity;
                const itemTotal = price * qty;
                subtotal += itemTotal;
                html += `<div class="cart-item">
                            <img class="cart-item-image" src="${item.image}" alt="${item.name}" onerror="this.src='https://placehold.co/400x500/fdf5e6/8b4513?text=Product'">
                            <div class="cart-item-details">
                                <div class="cart-item-title">${escapeHtml(item.name)}</div>
                                <div class="cart-item-category">${escapeHtml(item.category)}</div>
                                <div class="selected-size"><i class="fas fa-tag"></i> Size: ${escapeHtml(item.selectedSize || 'M')}</div>
                                <div class="cart-item-price">${formatPrice(price)}</div>
                                <div class="quantity-controls">
                                    <button class="quantity-btn" onclick="updateQuantity(${idx}, -1)">-</button>
                                    <span class="quantity">${qty}</span>
                                    <button class="quantity-btn" onclick="updateQuantity(${idx}, 1)">+</button>
                                </div>
                            </div>
                            <button class="remove-item" onclick="removeItem(${idx})"><i class="fas fa-trash-alt"></i></button>
                        </div>`;
            });
            container.innerHTML = html;
            // Total is now exactly subtotal (no hidden shipping fee)
            const total = subtotal;
            document.getElementById('total').innerHTML = formatPrice(total);
            // Store data for checkout (shipping = 0, total = subtotal)
            localStorage.setItem('orderSubtotal', subtotal);
            localStorage.setItem('orderShipping', 0);
            localStorage.setItem('orderTotal', total);
            localStorage.setItem('orderItems', JSON.stringify(cart));
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }

        // Load cart for current user
        function loadCartForUser(uid) {
            currentUserId = uid;
            const stored = localStorage.getItem(getCartKey());
            if (stored) {
                try {
                    cart = JSON.parse(stored);
                    cart = cart.filter(item => item && typeof item === 'object').map(item => ({
                        ...item,
                        price: parsePrice(item.price),
                        quantity: Math.max(1, parseInt(item.quantity) || 1),
                        name: item.name || 'Product',
                        category: item.category || 'Item',
                        image: item.image || 'https://placehold.co/400x500/fdf5e6/8b4513?text=Product',
                        selectedSize: item.selectedSize || 'M'
                    }));
                } catch(e) { cart = []; }
            } else { cart = []; }
            displayCart();
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUserId = user.uid;
                localStorage.setItem("isLoggedIn", "true");
                localStorage.setItem("currentUserId", user.uid);
                localStorage.setItem("customerEmail", user.email);
                localStorage.setItem("customerName", user.displayName || user.email.split('@')[0]);
                document.getElementById('customer-display').innerHTML = `<i class="fas fa-user"></i> ${user.displayName || user.email.split('@')[0]}`;
                loadCartForUser(user.uid);
            } else {
                currentUserId = null;
                cart = [];
                displayCart();
                document.getElementById('customer-display').innerHTML = `<i class="fas fa-user"></i> Guest`;
                localStorage.removeItem("isLoggedIn");
                localStorage.removeItem("currentUserId");
            }
        });

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (!cart.length) { alert('Cart is empty'); return; }
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            if (isLoggedIn !== 'true') {
                if (confirm('Please login to checkout. Go to login page?')) window.location.href = 'login.html';
                return;
            }
            window.location.href = 'checkout.html';
        });
    </script>
</body>
</html>
