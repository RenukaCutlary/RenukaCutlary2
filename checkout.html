<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Checkout · Renuka Ketlary</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #fefaf5;
      padding: 2rem 1.5rem;
      color: #2d241e;
    }
    .checkout-wrapper { max-width: 1200px; margin: 0 auto; }
    .checkout-header { margin-bottom: 2rem; text-align: center; }
    .checkout-header h1 { font-size: 1.8rem; font-weight: 600; color: #1e1a16; }
    .checkout-header h1 i { color: #b45f3b; margin-right: 8px; }
    .checkout-header p { color: #7c6858; font-size: 0.85rem; margin-top: 0.3rem; }
    .checkout-grid { display: grid; grid-template-columns: 1fr 380px; gap: 2rem; }
    .payment-panel {
      background: #ffffff;
      border-radius: 28px;
      padding: 1.8rem;
      border: 1px solid #f0e4d8;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
    }
    .payment-panel h2 {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      border-left: 4px solid #b45f3b;
      padding-left: 0.8rem;
    }
    .payment-option {
      background: #fef9f3;
      border-radius: 20px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      border: 1px solid #f0e2d6;
      cursor: pointer;
      transition: 0.2s;
    }
    .payment-option:hover { border-color: #c97e56; background: #fff7f0; }
    .payment-option input { margin-right: 12px; accent-color: #b45f3b; }
    .payment-option label { font-weight: 500; color: #2d241e; cursor: pointer; }
    .payment-desc { font-size: 0.75rem; color: #9b7b66; margin-left: 26px; margin-top: 5px; }
    .place-order-btn {
      background: #2d241e;
      border: none;
      color: white;
      font-weight: 600;
      padding: 14px 0;
      width: 100%;
      border-radius: 60px;
      font-size: 1rem;
      cursor: pointer;
      margin-top: 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: 0.2s;
    }
    .place-order-btn:hover { background: #b45f3b; transform: translateY(-2px); }
    .order-summary-card {
      background: #ffffff;
      border-radius: 28px;
      padding: 1.5rem;
      border: 1px solid #f0e4d8;
      position: sticky;
      top: 80px;
    }
    .order-summary-card h3 {
      font-size: 1.3rem;
      font-weight: 600;
      margin-bottom: 1rem;
      border-bottom: 2px solid #f0e2d6;
      padding-bottom: 0.5rem;
    }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.9rem; font-size: 0.95rem; color: #3e2e24; }
    .summary-row.shipping-row { border-bottom: 1px dashed #f0e2d6; padding-bottom: 0.7rem; margin-bottom: 0.7rem; }
    .total-row {
      display: flex;
      justify-content: space-between;
      font-weight: 800;
      font-size: 1.2rem;
      margin-top: 0.8rem;
      padding-top: 0.8rem;
      border-top: 2px solid #f0e2d6;
    }
    .total-row span:last-child { color: #b45f3b; font-size: 1.3rem; }
    .info-note { margin-top: 1.2rem; font-size: 0.7rem; text-align: center; color: #9b7b66; background: #fef9f3; padding: 0.7rem; border-radius: 60px; }
    @media (max-width: 780px) { .checkout-grid { grid-template-columns: 1fr; } .order-summary-card { position: static; } body { padding: 1rem; } }
  </style>
</head>
<body>
<div class="checkout-wrapper">
  <div class="checkout-header">
    <h1><i class="fas fa-lock"></i> Secure Checkout</h1>
    <p>Complete your purchase with confidence ✨</p>
  </div>
  <div class="checkout-grid">
    <div class="payment-panel">
      <h2><i class="fas fa-credit-card"></i> Choose payment method</h2>
      <form id="paymentForm">
        <div class="payment-option" onclick="document.getElementById('onlineRadio').click();">
          <input type="radio" name="paymentMethod" value="online" id="onlineRadio" checked>
          <label for="onlineRadio">💳 Pay Online (Card / UPI / Netbanking)</label>
          <div class="payment-desc">Razorpay secure gateway</div>
        </div>
        <div class="payment-option" onclick="document.getElementById('codRadio').click();">
          <input type="radio" name="paymentMethod" value="cod" id="codRadio">
          <label for="codRadio">📦 Cash on Delivery</label>
          <div class="payment-desc">Pay when your order arrives – ₹20 handling fee</div>
        </div>
        <button type="submit" id="placeOrderBtn" class="place-order-btn"><i class="fas fa-check-circle"></i> Place your order</button>
      </form>
    </div>
    <div class="order-summary-card">
      <h3><i class="fas fa-receipt"></i> Order Summary</h3>
      <div class="summary-row"><span>Items subtotal</span><span id="itemsTotalDisplay">₹0</span></div>
      <div class="summary-row shipping-row"><span>🚚 Delivery charge</span><span id="deliveryChargeDisplay">—</span></div>
      <div class="total-row"><span>Order Total</span><span id="orderTotalDisplay">₹0</span></div>
      <div class="info-note"><i class="fas fa-shield-alt"></i> Free shipping above ₹999</div>
    </div>
  </div>
</div>

<script>
  (function() {
    // Helper functions (cart, address, delivery)
    function getCart() { const stored = localStorage.getItem('cart'); return stored ? JSON.parse(stored) : []; }
    function computeItemsTotal(cart) { return cart.reduce((sum, item) => sum + (parseFloat(item.price)||0) * (parseInt(item.quantity)||1), 0); }
    function calculateDeliveryCharge(distanceKm) { if (distanceKm <= 3) return 20; if (distanceKm <= 7) return 30; if (distanceKm <= 15) return 50; if (distanceKm <= 25) return 70; return "NOT_AVAILABLE"; }
    function getDeliveryChargeFromAddress() {
      let address = localStorage.getItem("customerAddress") || "";
      if (!address.trim()) return { charge: null, status: "no_address" };
      address = address.toLowerCase();
      let distanceKm = 10;
      if (address.includes("vadodara")) distanceKm = 5;
      else if (address.includes("ahmedabad")) distanceKm = 8;
      else if (address.includes("surat")) distanceKm = 15;
      else distanceKm = 20;
      const charge = calculateDeliveryCharge(distanceKm);
      if (charge === "NOT_AVAILABLE") return { charge: null, status: "not_available" };
      return { charge, status: "ok" };
    }

    let currentItemsTotal = 0, currentDeliveryCharge = 0, currentOrderTotal = 0;

    function refreshOrderSummary() {
      const cart = getCart();
      currentItemsTotal = computeItemsTotal(cart);
      if (currentItemsTotal === 0 && cart.length === 0) {
        const backupTotal = parseFloat(localStorage.getItem("cartTotal"));
        if (!isNaN(backupTotal) && backupTotal > 0) currentItemsTotal = backupTotal;
      }
      document.getElementById("itemsTotalDisplay").innerHTML = `₹${currentItemsTotal.toFixed(2)}`;
      const deliveryInfo = getDeliveryChargeFromAddress();
      if (deliveryInfo.status === "no_address") {
        document.getElementById("deliveryChargeDisplay").innerHTML = `<span style="color:#b1624b;">Add address</span>`;
        currentDeliveryCharge = 0;
      } else if (deliveryInfo.status === "not_available") {
        document.getElementById("deliveryChargeDisplay").innerHTML = `<span style="color:#b45f3b;">Not available</span>`;
        currentDeliveryCharge = 0;
      } else {
        currentDeliveryCharge = deliveryInfo.charge;
        let chargeText = `₹${currentDeliveryCharge}`;
        if (currentItemsTotal > 999 && currentDeliveryCharge > 0) { currentDeliveryCharge = 0; chargeText = "FREE 🎉"; }
        document.getElementById("deliveryChargeDisplay").innerHTML = chargeText;
      }
      currentOrderTotal = currentItemsTotal + currentDeliveryCharge;
      document.getElementById("orderTotalDisplay").innerHTML = `₹${currentOrderTotal.toFixed(2)}`;
      localStorage.setItem("orderTotal", currentOrderTotal);
      localStorage.setItem("orderSubtotal", currentItemsTotal);
      localStorage.setItem("orderShipping", currentDeliveryCharge);
    }

    // COD
    function handleCOD() {
      if (currentItemsTotal <= 0) { alert("Cart empty"); return false; }
      localStorage.setItem("latestOrder", JSON.stringify({ itemsTotal: currentItemsTotal, deliveryCharge: currentDeliveryCharge, orderTotal: currentOrderTotal, payment: "COD", timestamp: new Date().toISOString() }));
      localStorage.removeItem("cart"); localStorage.removeItem("cartTotal");
      window.location.href = "orderdetail.html";
      return true;
    }

    // Online with Razorpay (real backend)
    async function handleOnlinePayment() {
      if (currentItemsTotal <= 0) { alert("Cart empty"); return false; }
      try {
        const response = await fetch("https://my-backend1-2-zz2k.onrender.com/api/payment/create-order", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ amount: currentOrderTotal })
        });
        const order = await response.json();
        const options = {
          key: "rzp_live_SJ7b95GLSEQjPp", // your test key
          amount: order.amount,
          currency: "INR",
          name: "Renuka Ketlary",
          order_id: order.id,
          handler: async function(resp) {
            const verify = await fetch("https://my-backend1-2-zz2k.onrender.com/api/payment/verify-payment", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(resp)
            });
            const data = await verify.json();
            if (data.success) {
              localStorage.setItem("latestOrder", JSON.stringify({ itemsTotal: currentItemsTotal, deliveryCharge: currentDeliveryCharge, orderTotal: currentOrderTotal, payment: "Online", razorpay_id: resp.razorpay_payment_id, timestamp: new Date().toISOString() }));
              localStorage.removeItem("cart"); localStorage.removeItem("cartTotal");
              window.location.href = "orderdetail.html";
            } else alert("Verification failed");
          },
          prefill: { name: localStorage.getItem("customerName") || "Guest", email: localStorage.getItem("customerEmail") || "guest@renuka.com", contact: "9999999999" },
          theme: { color: "#b45f3b" }
        };
        const rzp = new Razorpay(options);
        rzp.open();
      } catch (err) {
        console.error(err);
        alert("Payment server not reachable. Please start backend (node server.js) on port 5000.");
      }
    }

    // Form submit
    document.getElementById("paymentForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const selected = document.querySelector('input[name="paymentMethod"]:checked').value;
      refreshOrderSummary();
      if (currentItemsTotal === 0 && getCart().length === 0) { alert("Cart empty"); return; }
      const btn = document.getElementById("placeOrderBtn");
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Processing...';
      btn.disabled = true;
      if (selected === "cod") handleCOD();
      else await handleOnlinePayment();
      btn.innerHTML = original;
      btn.disabled = false;
    });

    window.addEventListener("storage", () => refreshOrderSummary());
    refreshOrderSummary();
  })();
</script>
</body>
</html>
